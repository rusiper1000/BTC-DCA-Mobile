<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>비트코인 저축</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">

<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

<style>
:root {
  --bg: #0e1117;
  --bg2: #141820;
  --card: #1a2030;
  --card2: #1e2535;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --ink: #f0f4ff;
  --muted: #8892a4;
  --muted2: #5d6880;
  --accent: #f7931a;
  --accent-glow: rgba(247,147,26,0.15);
  --accent2: #3b82f6;
  --accent2-glow: rgba(59,130,246,0.15);
  --good: #22c55e;
  --bad: #ef4444;
  --good-bg: rgba(34,197,94,0.1);
  --bad-bg: rgba(239,68,68,0.1);
  --radius: 16px;
  --radius-lg: 24px;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
}
* { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body {
  color:var(--ink);
  font-family:'Pretendard',system-ui,sans-serif;
  background:var(--bg);
  min-height:100vh;
  font-size:14px;
  line-height:1.6;
}
body::before {
  content:"";
  position:fixed;
  top:-200px; right:-200px;
  width:600px; height:600px;
  background:radial-gradient(circle, rgba(247,147,26,0.06) 0%, transparent 70%);
  pointer-events:none; z-index:0;
}
body::after {
  content:"";
  position:fixed;
  bottom:-200px; left:-200px;
  width:500px; height:500px;
  background:radial-gradient(circle, rgba(59,130,246,0.05) 0%, transparent 70%);
  pointer-events:none; z-index:0;
}
.wrap { max-width:1360px; margin:0 auto; padding:24px 20px; position:relative; z-index:1; }
.topbar {
  display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;
  padding:14px 20px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:24px;
  margin-bottom:20px;
}
.topbar-left { display:flex; align-items:center; gap:12px; }
.logo-text { font-size:18px; font-weight:800; letter-spacing:-0.03em; color:var(--ink); }
.logo-text span { color:var(--accent); }
.live-price-area { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.live-btn {
  display:inline-flex; align-items:center; gap:6px;
  padding:8px 14px; border-radius:10px;
  background:var(--accent-glow); border:1px solid rgba(247,147,26,0.25);
  color:var(--accent); font-weight:700; font-size:13px;
  cursor:pointer; transition:all .2s;
}
.live-btn:hover { background:rgba(247,147,26,0.25); transform:translateY(-1px); }
.live-btn svg { width:14px; height:14px; }
.live-price-val { font-size:13px; font-weight:700; color:var(--ink); }
.live-price-time { font-size:11px; color:var(--muted); }
.kpi-grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  margin-bottom:16px;
}
.kpi-card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:24px;
  padding:20px;
  position:relative; overflow:hidden;
}
.kpi-card:hover { transform:translateY(-2px); }
.kpi-card::before {
  content:"";
  position:absolute; top:0; left:0; right:0; height:3px;
  border-radius:24px 24px 0 0;
}
.kpi-card.k-invested::before { background:#3b82f6; }
.kpi-card.k-btc::before { background:#f7931a; }
.kpi-card.k-value::before { background:linear-gradient(90deg,#3b82f6,#f7931a); }
.kpi-card.k-return::before { background:#22c55e; }
.kpi-icon { font-size:20px; margin-bottom:10px; }
.kpi-label { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:6px; }
.kpi-val { font-size:28px; font-weight:900; letter-spacing:-0.04em; line-height:1; }
.kpi-sub { font-size:12px; color:var(--muted); margin-top:6px; }
.content-grid {
  display:grid;
  grid-template-columns:1.7fr 1fr;
  gap:16px;
  margin-bottom:16px;
}
.card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:24px;
  padding:24px;
}
.card-title {
  font-size:16px; font-weight:800; color:var(--ink); margin-bottom:18px;
  display:flex; align-items:center; gap:8px;
}
.card-title .dot {
  width:8px; height:8px; border-radius:99px;
  background:var(--accent); display:inline-block;
}
</style>
</head>
<body>
<div class="wrap">

<div class="topbar">
  <div class="topbar-left">
    <img src="icon-192.png" alt="비트코인 저축" style="width:40px; height:40px; border-radius:12px; object-fit:contain; background:#f7931a; padding:4px;">
    <div>
      <div class="logo-text">비트코인 <span>저축</span></div>
    </div>
  </div>
  <div class="live-price-area">
    <button class="live-btn" onclick="fetchLivePrice()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 18 0 9 9 0 0 0-18 0"/><path d="M12 8v4l3 3"/></svg>
      실시간 BTC 조회
    </button>
    <span id="livePriceVal" class="live-price-val"></span>
    <span id="livePriceTime" class="live-price-time"></span>
  </div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
