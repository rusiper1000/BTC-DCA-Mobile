<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BTC DCA Mobile</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-180.jpg">
    <meta name="theme-color" content="#F7931A">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --btc-orange: #F7931A;
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent-color: #4caf50;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 450px;
        }
        header {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 30px;
        }
        header img {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            margin-bottom: 10px;
        }
        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            margin-bottom: 20px;
        }
        h1 { color: var(--btc-orange); margin: 0; font-size: 1.6rem; font-weight: 800; }
        label { display: block; font-size: 0.85rem; color: #bbb; margin-bottom: 8px; }
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 12px;
            border: 1px solid #333;
            background: #2c2c2c;
            color: white;
            box-sizing: border-box;
            font-size: 1.1rem;
        }
        button {
            width: 100%;
            padding: 16px;
            background: var(--btc-orange);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
        }
        .result-val { font-size: 1.4rem; font-weight: bold; color: var(--accent-color); text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <img src="icon-192.jpg" alt="App Icon">
            <h1>BTC DCA Tracker</h1>
            <p style="color:#888; font-size:0.9rem;">비트코인 적립식 투자 계산기</p>
        </header>

        <div class="card">
            <label for="amount">매수 금액 (KRW)</label>
            <input type="number" id="amount" placeholder="금액을 입력하세요" inputmode="numeric">
            <button onclick="calculate()">계산하기</button>
        </div>

        <div id="resultCard" class="card" style="display:none;">
            <div style="text-align:center;">
                <label>예상 획득 수량</label>
                <div id="result" class="result-val"></div>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(reg => console.log('PWA OK'))
                    .catch(err => console.log('PWA Fail'));
            });
        }

        function calculate() {
            const amount = document.getElementById('amount').value;
            const resultCard = document.getElementById('resultCard');
            const resultDiv = document.getElementById('result');
            if(amount > 0) {
                const btcPrice = 95000000; // 현재 기준 시세 (수정 가능)
                const btcAmount = (amount / btcPrice).toFixed(8);
                resultCard.style.display = 'block';
                resultDiv.innerHTML = `<strong>${btcAmount} BTC</strong>`;
            }
        }
    </script>
</body>
</html>
